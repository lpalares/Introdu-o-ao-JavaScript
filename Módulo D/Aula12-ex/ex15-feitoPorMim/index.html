<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificador de idade</title>
    <link rel="stylesheet" href="style/style.css">
</head>
<body>
    <header>
        <h1>Verificador de idade</h1>
    </header>
    <section>
        <div>
            <div id="birthBox">
                <label for="birth">Ano de nascimento:</label>
                <input type="number" name="birth" id="birth">
            </div>
            <div id="genderBox">
                Sexo:
                <input type="radio" name="gender" id="masc" value="masc" checked>
                <label for="masc">Masculino</label>
                <input type="radio" name="gender" id="fem" value="fem">
                <label for="fem">Feminino</label>
            </div>
            <input type="button" value="Verificar" onclick="check()">
        </div>
        <div id="res">
            Aperte em "verificar" após informar ano de nascimento e sexo...
        </div>
    </section>
    <footer>
        <p>&copy; CursoemVideo</p>
    </footer>
    <script src="script.js">

    </script>
</body>
</html>
