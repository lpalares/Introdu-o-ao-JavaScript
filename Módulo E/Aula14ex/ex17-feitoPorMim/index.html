<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabuada</title>
    <link rel="stylesheet" href="style/style.css">
</head>
<body>
    <header>
        <h1>Tabuada</h1>
    </header>
    <section>
        <div>
            <label for="input-number">Número:</label>
            <input type="number" name="input-number" id="input-number">
            <button id="btn-mtable">Gerar tabuada</button>
            <!-- Coloquei id para adicionar event listener no script.
            No cenário atual acredito que seria melhor colocar onclick no botão para ocupar menos linhas de código, mas quero praticar as duas formas. -->
        </div>
        <div>
            <select name="mtable" id="mtable" size="10"> <!-- mtable = multiplication table -->
                <option value="">Digite um número acima</option>
            </select>
        </div>
    </section>
    <footer>
        <p>&copy; CursoemVideo</p>
    </footer>
    <script src="script.js">

    </script>
</body>
</html>
