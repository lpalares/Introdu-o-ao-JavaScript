<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super criador de imagem</title>
    <link rel="stylesheet" href="style/style.css">
</head>
<body>
    <header>
        Super Criador de Imagens
    </header>
    <main>
        <section>
            <h1>Super criador de imagem PRO</h1>
            <p>Seja bem-vindo(a) ao <strong>melhor</strong> site de criação de imagens! Selecione o fundo da imagem e o conteúdo.</p>
            <div>
                <h2>Selecione o fundo da imagem.</h2>
                <div class="selBackground">
                    <img src="img/background_001(mini).jpg" alt="Fundo de campo ensolarado">
                    <button id="b1">Fundo 01</button>
                </div>
                <div class="selBackground">
                    <img src="img/background_002(mini).jpg" alt="Fundo de campo à noite">
                    <button id="b2">Fundo 02</button>
                </div>
                <div class="selBackground">
                    <img src="img/background_003(mini).jpg" alt="Fundo do espaço estrelado">
                    <button id="b3">Fundo 03</button>
                </div>
            </div>
            <div>
                <h2>Selecione o conteúdo da imagem.</h2>
                <div class="selContent">
                    <img src="img/content_001(mini).png" alt="Pessoas em um piquenique">
                    <button id="c1">Conteúdo 01</button>
                </div>
                <div class="selContent">
                    <img src="img/content_002(mini).png" alt="Silhueta de jardineiro">
                    <button id="c2">Conteúdo 02</button>
                </div>
                <div class="selContent">
                    <img src="img/content_003(mini).png" alt="Astrounauta flutuando">
                    <button id="c3">Conteúdo 03</button>
                </div>
            </div>
        </section>
        <section id="imgRes">
            Esperando...
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
