<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste 001</title>
</head>
<body>
    <script>
        calc(); //Chama a função

        function calc() {
            let n1, n2; //Cria as variáveis.

            do {
                n1 = Number(prompt('Digite o primeiro número: '));
                n2 = Number(prompt('Digite o segundo número: '));

                if(isNaN(n1) || isNaN(n2)) {
                    alert('Digite apenas números.');
                }
            } while(isNaN(n1) || isNaN(n2));
                let soma = n1 + n2;
                alert(`A soma entre ${n1} e ${n2} é ${soma}!`);
        }

        /*
        O código funcionou para o que eu queria, mas ele é defeituoso.
        Se o usuário apertar em cancelar, será definido um valor 0 em vez de cancelar.
        Esse código foi um teste apenas para obrigar o usuário a colocar número antes de prosseguir, por isso não fiz nada sobre o cancelar.
        */
    </script>
</body>
</html>
